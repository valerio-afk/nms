{% extends "card.html" %}

{% block card_title %}<i class="bi bi-pie-chart-fill"></i> Disk Usage{% endblock %}

{% block card_content %}


<div class="d-flex flex-column align-items-center">
  <svg width="120" height="120" viewBox="0 0 36 36" class="circular-chart blue">
    <path class="circle-bg"
      d="M18 2.0845
         a 15.9155 15.9155 0 0 1 0 31.831
         a 15.9155 15.9155 0 0 1 0 -31.831"/>
    <path class="circle"
      stroke-dasharray="{{ usage }}, 100"
      d="M18 2.0845
         a 15.9155 15.9155 0 0 1 0 31.831
         a 15.9155 15.9155 0 0 1 0 -31.831"/>
    <text x="18" y="20.35" class="percentage" text-anchor="middle">{{ usage }}%</text>
  </svg>
</div>



  <script>
    GlobalRefresher.register("{{ card_id }}","{{ url_for('main.async_widget_disk_usage') }}");
  </script>

{% endblock %}
