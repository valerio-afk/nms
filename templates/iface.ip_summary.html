<ul class="list-unstyled ps-3">
    <li><span class="fw-bold pe-3">{{ _("Dynamic IP") }}:</span> {{ ip.dynamic | enabled_fmt | safe }}</li>
    <li><span class="fw-bold">{{ _("Address") }}:</span> {{ ip.address }}</li>
    <li><span class="fw-bold">{{ _("Netmask") }}:</span> {{ ip.netmask }}</li>
    <li><span class="fw-bold">{{ _("Gateway") }}:</span> {{ ip.gateway }}</li>
    <li><span class="fw-bold">{{ _("DNS") }}:</span> {{ ip.dns | join(", ") }}</li>

</ul>
