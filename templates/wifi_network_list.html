<form method="POST" class="auto-submit-switch disable-on-submit" action="{{ url_for('main.wifi_connect',iface=iface) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <table class="table table-hover">
      <tbody>
        {% for net in networks if net.ssid %}
        <tr>
          <!-- Column 1: radio button -->
          <td class="text-center align-middle col-1">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="selected_network"
                     value="{{ net.ssid or net.bssid }}"
                     {% if net.connected %}checked{% endif %}>
            </div>
          </td>

          <!-- Column 2: SSID or BSSID -->
          <td class="align-middle col-9">{{ net.ssid }}</td>

          <!-- Column 3: strength -->
          <td class="text-center align-middle col-1"><i class="bi bi-reception-{{ net.strength }}"></i></td>

          <!-- Column 4: lock icon if secured -->
          <td class="text-center align-middle col-1">
            {% if net.security and net.security|lower != 'none' %}
              <i class="bi bi-lock" title="{{ net.security }}"></i>
            {% endif %}
          </td>
        </tr>
        {% endfor %}
        <tr>
            <td class="text-center align-middle col-1">
                <div class="form-check"><input class="form-check-input toggle" type="radio" id="custom-network" name="selected_network" value="hidden"></div>
            </td>

            <td colspan="3">
                <input class="form-control toggle-target custom-network" name="custom-ssid" placeholder="{{ _('Insert network name manually') }}" />
            </td>
        </tr>
      </tbody>
    </table>

    <div class="row mt-4">
        <div class="col-4 col-form-label"><label for="psk">{{ _("Password") }}</label></div>
        <div class="col-8"><input class="form-control" name="psk" id="psk" placeholder="{{ _('If required') }}" /></div>
    </div>

    <div class="row mt-4">
        <div class="col-12"><button type="submit" class="btn btn-success w-100">{{ _("Connect") }}</button></div>
    </div>
</form>
