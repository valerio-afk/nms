{% extends "index.html" %}

{% block title %}We are working for you...{% endblock %}

{% block content %}

<div class='pac-man' ></div>

<div class="wait-msg">
    <p>{{ waiting_message }}</p>
</div>

{% if refresh_to %}
<script src="{{ url_for('static', filename='wait_until.js') }}"></script>
<script>
    const waiter = new WaitUntil('{{ refresh_to }}', {csrf_token: '{{ csrf_token() }}' });
    waiter.startPolling(2000);
</script>

{% endif %}

{% endblock %}
