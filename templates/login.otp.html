<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NAS Management System</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap-5.3.8-dist/css/bootstrap.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap-icons-1.13.1/bootstrap-icons.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
  {% for css in extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename=css) }}">
  {% endfor %}
</head>
<body>
<div class="otp-box card">
    <h4 class="mb-3">Scan QR Code in your authenticator app</h4>

    <form method="POST" id="otpForm" action="{{ url_for('main.configure_otp') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="d-flex justify-content-center mb-3">
            <img src="{{ url_for('main.otp_qr') }}" />
        </div>

        <button class="btn btn-success w-100">I have scanned it</button>
    </form>
</div>

</body>
</html>
