<div class="col-6">
    <form action="{{ btn_link }}" method="{{ btn_method }}">
        {% if btn_method.upper() == 'POST' %}
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          {% endif %}
        <div class="square-btn-wrapper">
          <button type="button"
                  modal-confirm
                  modal-action="{{ btn_link}}"
                  modal-method="{{ btn_method }}"
                  modal-message="{{ btn_message }}"
                  class="btn w-100 square-btn" {% if btn_disabled %} disabled {% endif %}>
              {{ btn_icon }}

          <div class="btn-title fw-bold">{{ btn_title }}</div>
            <div class="btn-text mt-3">
                {{ btn_text }}
            </div>
          </button>
        </div>
    </form>
</div>
